<!DOCTYPE html>

<html lang="en">

<head>
	<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
	
	<!-- Style Sheet for common elements -->
	<link rel="stylesheet" href="style/common.css" type="text/css" />
	<!-- Dashboard Style Sheets -->
	<link rel="stylesheet" href="style/dashboard.css" type="text/css" />
	<link rel="stylesheet" href="style/dbconsole.css" type="text/css" />
	<link rel="stylesheet" href="style/dboptions.css" type="text/css" />
	<link rel="stylesheet" href="style/dbserver.css" type="text/css" />
	<link rel="stylesheet" href="style/dbwidgets.css" type="text/css" />
	<!-- Modules Style Sheets -->
	<!-- Troubleshoot Style Sheets -->
	<!-- Style Sheet for navigation -->
	<link rel="stylesheet" href="style/navigation.css" type="text/css" />
	
	<!-- Scripts for loading and requesting data -->
	<script type="text/javascript" src="script/dashboard.js"></script>
</head>

<body>
	<nav>
		<h2 onclick="openGithub();">Widgix</h2>
		<ul>
			<li onclick="tblClicked();" id="nav-tbl" class="nav close">Troubleshoot</li>
			<li onclick="modClicked();" id="nav-mod" class="nav close">Modules</li>
			<li onclick="dbClicked();" id="nav-db" class="nav open">Dashboard</li>
		</ul>
	</nav>

	<div id="db">
		<div id="db-options" class="rgt-wall">
			<div class="tt-pane bot-wall"><h1 class="pane-tt">Options</h1></div>
			<!-- Serve Remote Option -->
			<div id="serve-remote" class="pane bot-wall">
				<div class="entry-pair">
					<label for="sel-remote" class="entry-label">Serve Remote:</label>
					<select id="sel-remote" class="drop-down entry">
						<option value="no">Never</option>
						<option value="safe">Whitelist</option>
						<option value="yes">Always</option>		
					</select>
				</div>
				<ul id="safe-remotes">
					<div class="top-wall"></div>
					<li class="safe-remote">127.000.000.001</li>
					<li id="add-safe-remote">
						<input type="text" id="new-safe" class="txt-entry entry" value="xxx.xxx.xxx.xxx" />
						<div id="add-new-safe" class="main-button">Add</div>
					</li>
				</ul>
			</div>
			<!-- Server Port Option -->
			<div id="server-port" class="pane bot-wall">
				<div class="entry-pair">
					<label for="port-num" class="entry-label">Server Port:</label>
					<div class="entry">
						<input type="text" id="port-num" class="txt-entry" value="3000"/>
						<div id="change-port" class="main-button">Change</div>
					</div>
				</div>
			</div>
			<!-- Refresh Rate -->
			<div id="refresh-rate" class="pane bot-wall">
				<div class="entry-pair">
					<label for="sel-refresh" class="entry-label">Refresh Rate:</label>
					<select id="sel-refresh" class="drop-down entry">
						<option value="low">Low</option>
						<option value="medium">Medium</option>
						<option value="high">High</option>
						<option value="crazy">Too High</option>
					</select>
				</div>
			</div>
			<!-- Debug Configuration -->
			<div id="debug-config" class="pane bot-wall">
				<div class="entry-pair">
					<label for="sel-debug" class="entry-label">Debug Config:</label>
					<select id="sel-debug" class="drop-down entry">
						<option value="none">Normal</option>
						<option value="log">Log Errors</option>
						<option value="all">Developer</option>
					</select>
				</div>
			</div>
			<!-- Quit Application Button -->
			<div id="quit-app" class="main-button">Quit</div>
		</div>
		<div id="db-widgets" class="rgt-wall"></div>
		<div id="db-server" class="bot-wall"></div>
		<div id="db-console"></div>
	</div>

	<span id="mod"></span>

	<span id="tbl"></span>
</body>

</html>
