<!DOCTYPE html>

<html lang="en">

<head>
	<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
	
	<!-- Style Sheet for common elements -->
	<link rel="stylesheet" href="style/common.css" type="text/css" />
	<!-- Dashboard Style Sheets -->
	<link rel="stylesheet" href="style/dashboard.css" type="text/css" />
	<link rel="stylesheet" href="style/dbconsole.css" type="text/css" />
	<link rel="stylesheet" href="style/dbserver.css" type="text/css" />
	<link rel="stylesheet" href="style/dbwidgets.css" type="text/css" />
	<!-- Modules Style Sheets -->
	<!-- Troubleshoot Style Sheets -->
	<!-- Style Sheet for navigation -->
	<link rel="stylesheet" href="style/navigation.css" type="text/css" />
	
	<!-- Scripts for loading and requesting data -->
	<script type="text/javascript" src="script/dashboard.js"></script>
</head>

<body>
	<nav>
		<h2 onclick="openGithub();">Widgix</h2>
		<ul>
			<li onclick="tblClicked();" id="nav-tbl" class="nav close">Troubleshoot</li>
			<li onclick="modClicked();" id="nav-mod" class="nav close">Modules</li>
			<li onclick="dbClicked();" id="nav-db" class="nav open">Dashboard</li>
		</ul>
	</nav>

	<div id="db">
		<div id="db-console"></div>
		<div id="db-widgets" class="rgt-wall"></div>
		<div id="db-server" class="top-wall rgt-wall">
			<h3>Activate Widgets</h3>
			<span class="sld-track sld-tr-off" id="server-tg" onclick="toggle_server();">
				<div class="sld-thumb sld-th-off" id="server-tg-thumb"></div>
			</span>
			<div>
				<p id="server-st">ready to serve</p>
				<div class="cell cell-off" id="server-st-q"><div class="pl pl-origami"></div></div>
			</div>
		</div>
	</div>

	<span id="mod"></span>
	<span id="tbl"></span>
</body>

</html>
